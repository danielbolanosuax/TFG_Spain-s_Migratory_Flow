# .github/workflows/pipeline.yml
name: TFG Pipeline - Ingest + Merge + Insights

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"
  push:
    branches: [main]
    paths:
      - "collectors/**"
      - "trigger.py"
      - "run_insights.py"
      - "notebooks/05_insights/**"
      - "requirements.txt"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      WAQI_TOKEN:    ${{ secrets.WAQI_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: DEBUG - verificar requirements.txt y LFS
        run: |
          echo "=== tail requirements.txt ==="
          tail -10 requirements.txt
          echo "=== scipy en requirements ==="
          grep -i scipy requirements.txt || echo "NO ENCONTRADO"
          echo "=== xlsx en data/conectividad/setid ==="
          ls -lh data/conectividad/setid/ 2>/dev/null || echo "CARPETA NO EXISTE"
          echo "=== git lfs ls-files ==="
          git lfs ls-files

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: DEBUG - verificar scipy instalado
        run: |
          pip show scipy || echo "scipy NO instalado"
          python -c "from scipy import stats; print('scipy OK')"

      - name: Create output dirs
        run: |
          mkdir -p output/logs
          mkdir -p output/executed_notebooks

      - name: Run full pipeline (ingest + merge)
        run: python trigger.py

      - name: Run insights notebooks (05-09)
        run: python run_insights.py

      - name: Commit updated outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: auto-regenerate outputs [$(date +'%Y-%m-%d')]"
          git push
