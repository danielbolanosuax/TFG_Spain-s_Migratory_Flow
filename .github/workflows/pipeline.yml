# .github/workflows/pipeline.yml
name: TFG Pipeline — Ingest + Merge + Insights

on:
  # Lanzamiento manual desde GitHub UI
  workflow_dispatch:

  # Automático: primer día de cada mes a las 6:00 UTC
  # (cuando el INE publica datos nuevos)
  schedule:
    - cron: "0 6 1 * *"

  # También al hacer push a main (útil durante desarrollo)
  push:
    branches: [main]
    paths:
      - "collectors/**"
      - "trigger.py"
      - "run_insights.py"
      - "notebooks/05_insights/**"
      - "requirements.txt"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      WAQI_TOKEN:    ${{ secrets.WAQI_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output dirs
        run: |
          mkdir -p output/logs
          mkdir -p output/executed_notebooks

      - name: Run full pipeline (ingest + merge)
        run: python trigger.py

      - name: Run insights notebooks (05–09)
        run: python run_insights.py

      - name: Commit updated outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: auto-regenerate outputs [$(date +'%Y-%m-%d')]"
          git push